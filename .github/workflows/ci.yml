name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - docs/**
      - hooks/**
      - README.md
      - .gitignore
      - .gitattributes
      - .github/skills/**
      - .github/workflows/ci.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  spdx:
    name: Check SPDX headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check SPDX headers
        run: bash hooks/check-spdx-headers --all

  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: fmt

      - name: Check formatting
        run: cargo fmt --check --all

  clippy:
    name: Check linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: clippy

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: test

      - name: Run tests
        run: cargo test --workspace --locked

  azure-live:
    name: Azure live block-store tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'westus2' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Detect Azure live-test changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          relevant_prefixes=(
            "crates/lexongraph-block-store-azure/"
            "crates/lexongraph-block-store-azure-sdk/"
            "crates/lexongraph-block-store-azure-table-v2/"
            "docs/specs/rust-azure-blob-block-store/"
            "docs/specs/rust-azure-blob-block-store-sdk/"
            "docs/specs/rust-azure-table-block-store-v2/"
            "docs/specs/rust-workspace-ci/"
          )
          relevant_files=(
            "Cargo.toml"
            "Cargo.lock"
            ".github/workflows/ci.yml"
          )

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"

          if [[ -n "$base_sha" && "$base_sha" != "0000000000000000000000000000000000000000" ]]; then
            git fetch --no-tags --depth=1 origin "$base_sha"
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          else
            changed_files="$(git ls-tree --name-only -r "$head_sha")"
          fi

          run_live_tests=false
          while IFS= read -r path; do
            for file in "${relevant_files[@]}"; do
              if [[ "$path" == "$file" ]]; then
                run_live_tests=true
                break
              fi
            done
            if [[ "$run_live_tests" == "true" ]]; then
              break
            fi

            for prefix in "${relevant_prefixes[@]}"; do
              if [[ "$path" == "$prefix"* ]]; then
                run_live_tests=true
                break
              fi
            done
            if [[ "$run_live_tests" == "true" ]]; then
              break
            fi
          done <<< "$changed_files"

          echo "run_live_tests=$run_live_tests" >> "$GITHUB_OUTPUT"

      - name: Skip when Azure live-test surfaces are unchanged
        if: steps.changes.outputs.run_live_tests != 'true'
        run: echo "Skipping Azure live verification because no Azure-relevant paths changed."

      - name: Validate Azure OIDC configuration
        if: steps.changes.outputs.run_live_tests == 'true'
        shell: bash
        run: |
          set -euo pipefail
          : "${AZURE_CLIENT_ID:?Set AZURE_CLIENT_ID as a repository variable or secret.}"
          : "${AZURE_TENANT_ID:?Set AZURE_TENANT_ID as a repository variable or secret.}"
          : "${AZURE_SUBSCRIPTION_ID:?Set AZURE_SUBSCRIPTION_ID as a repository variable or secret.}"
          : "${AZURE_LOCATION:?Set AZURE_LOCATION as a repository variable or rely on the default.}"

      - uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        if: steps.changes.outputs.run_live_tests == 'true'
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        if: steps.changes.outputs.run_live_tests == 'true'

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        if: steps.changes.outputs.run_live_tests == 'true'
        with:
          key: azure-live

      - name: Provision temporary Azure Blob and Table test resources
        if: steps.changes.outputs.run_live_tests == 'true'
        shell: bash
        run: |
          set -euo pipefail

          resource_group="lexongraph-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          storage_suffix="$(
            printf '%s' "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" | sha256sum | cut -c1-20
          )"
          storage_account="lgaz${storage_suffix}"
          container_name="blocks"
          table_name="blocks"

          echo "AZURE_TEST_RESOURCE_GROUP=$resource_group" >> "$GITHUB_ENV"

          az group create \
            --name "$resource_group" \
            --location "$AZURE_LOCATION" \
            --output none

          az storage account create \
            --name "$storage_account" \
            --resource-group "$resource_group" \
            --location "$AZURE_LOCATION" \
            --sku Standard_LRS \
            --kind StorageV2 \
            --https-only true \
            --output none

          account_key="$(
            az storage account keys list \
              --account-name "$storage_account" \
              --resource-group "$resource_group" \
              --query '[0].value' \
              --output tsv
          )"

          az storage container create \
            --account-name "$storage_account" \
            --name "$container_name" \
            --auth-mode login \
            --output none

          az storage table create \
            --account-name "$storage_account" \
            --name "$table_name" \
            --account-key "$account_key" \
            --output none

          expiry="$(date -u -d '+2 hours' '+%Y-%m-%dT%H:%MZ')"
          blob_sas="$(
            az storage container generate-sas \
              --account-name "$storage_account" \
              --name "$container_name" \
              --permissions racwl \
              --expiry "$expiry" \
              --auth-mode login \
              --as-user \
              --https-only \
              --output tsv
          )"
          blob_sas_url="https://${storage_account}.blob.core.windows.net/${container_name}?${blob_sas}"
          table_sas="$(
            az storage table generate-sas \
              --account-name "$storage_account" \
              --name "$table_name" \
              --account-key "$account_key" \
              --permissions ra \
              --expiry "$expiry" \
              --https-only \
              --output tsv
          )"
          table_sas_url="https://${storage_account}.table.core.windows.net/${table_name}?${table_sas}"

          echo "::add-mask::$blob_sas"
          echo "::add-mask::$blob_sas_url"
          echo "::add-mask::$account_key"
          echo "::add-mask::$table_sas"
          echo "::add-mask::$table_sas_url"
          echo "LEXONGRAPH_AZURE_TEST_CONTAINER_SAS_URL=$blob_sas_url" >> "$GITHUB_ENV"
          echo "LEXONGRAPH_AZURE_TEST_TABLE_SAS_URL=$table_sas_url" >> "$GITHUB_ENV"

      - name: Run live Azure block-store tests
        if: steps.changes.outputs.run_live_tests == 'true'
        env:
          RUST_TEST_THREADS: 1
        run: |
          cargo test -p lexongraph-block-store-azure --locked --test live_azure -- --ignored
          cargo test -p lexongraph-block-store-azure-sdk --locked --test live_azure -- --ignored
          cargo test -p lexongraph-block-store-azure-table-v2 --locked --test live_azure -- --ignored

      - name: Clean up temporary Azure resources
        if: always() && steps.changes.outputs.run_live_tests == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AZURE_TEST_RESOURCE_GROUP:-}" ]] && [[ "$(az group exists --name "$AZURE_TEST_RESOURCE_GROUP")" == "true" ]]; then
            az group delete --name "$AZURE_TEST_RESOURCE_GROUP" --yes
          fi

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: coverage

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --locked --lcov --output-path lcov.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
